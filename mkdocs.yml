site_name: AI Agent Roadmap
site_description: A practical AI agent learning path and knowledge database for developers.
site_url: https://AceronX.github.io/ai-agent-roadmap/
repo_url: https://github.com/AceronX/ai-agent-roadmap
repo_name: ai-agent-roadmap

theme:
  name: material
  language: en
  icon:
    logo: material/robot-outline
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.path
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css?v=15

extra_javascript:
  - javascripts/diagram-viewer.js?v=5

not_in_nav: |
  stages/**/checkpoint.md
  stages/*/*/examples.md
  stages/*/*/*.md
  reference/resources/*.md
  reference/best-practices/*.md

markdown_extensions:
  - toc:
      toc_depth: 2-3
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Roadmap: roadmap.md
  - Stages:
      - stages/index.md
      - Roadmap.sh Alignment: stages/roadmap-sh-alignment.md
