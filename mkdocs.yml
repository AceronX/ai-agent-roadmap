      - 01 Prerequisites:
          - stages/01-prerequisites/index.md
          - Backend Basics: stages/01-prerequisites/backend-basics/index.md
          - Git and Terminal: stages/01-prerequisites/git-and-terminal/index.md
      - 02 LLM Fundamentals:
          - stages/02-llm-fundamentals/index.md
          - Transformer Models: stages/02-llm-fundamentals/transformer-models/index.md
          - Tokenization: stages/02-llm-fundamentals/tokenization/index.md
